apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-network-services-authz-extension
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Google Cloud Network Services AuthzExtension
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-network-security-authz.git
      sourceType: git
      dir: /modules/authz-extension
    version: 0.4.1
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
    costEstimate:
      description: Blueprint cost details
      url: https://cloud.google.com/products/calculator?id=02fb0c45-cc29-4567-8cc6-f72ac9024add
  content:
    architecture:
      diagramUrl: https://www.link-to-architecture-diagram.com
      description:
        - 1. Architecture description step no. 1
        - 2. Architecture description step no. 2
        - 3. Architecture description step no. N
    documentation:
      - title: Hosting a Static Website
        url: https://cloud.google.com/storage/docs/hosting-static-website
    examples:
      - name: authz_extension
        location: examples/authz_extension
      - name: authz_policy
        location: examples/authz_policy
      - name: policy_authz_extension
        location: examples/policy_authz_extension
  interfaces:
    variables:
      - name: authority
        description: The authority header of the gRPC request.
        varType: string
      - name: description
        description: A free-text description of the resource.
        varType: string
      - name: labels
        description: A set of key/value label pairs to assign to the resource.
        varType: map(string)
        defaultValue: {}
      - name: load_balancing_scheme
        description: The load balancing scheme for which the AuthzExtension is applicable. Must be one of `INTERNAL_MANAGED` or `EXTERNAL_MANAGED`.
        varType: string
      - name: location
        description: The location of the AuthzExtension resource.
        varType: string
        required: true
      - name: name
        description: The name of the AuthzExtension resource.
        varType: string
        required: true
      - name: project_id
        description: The ID of the project in which the resource belongs. If not provided, the provider project is used.
        varType: string
        required: true
      - name: service
        description: The service that runs the extension (e.g., a BackendService URI or iap.googleapis.com).
        varType: string
        required: true
      - name: timeout
        description: "Specifies the timeout for each individual message on the stream (between 10-10000ms). Format: '0.1s'."
        varType: string
        required: true
      - name: fail_open
        description: Determines how the proxy behaves if the call to the extension fails. TRUE to continue, FALSE to error.
        varType: bool
        defaultValue: false
      - name: metadata
        description: Metadata included as part of the ProcessingRequest message. Supports {forwarding_rule_id} substitution.
        varType: map(string)
        defaultValue: {}
      - name: forward_headers
        description: List of HTTP headers to forward to the extension. If omitted, all headers are sent.
        varType: list(string)
      - name: wire_format
        description: "The format of communication supported. Possible values: WIRE_FORMAT_UNSPECIFIED, EXT_PROC_GRPC, EXT_AUTHZ_GRPC."
        varType: string
      - name: model_armor_templates
        description: Optional list of Model Armor template full resource paths (e.g., projects/{project}/locations/{location}/templates/{template_id}). When provided, adds model_armor_settings to metadata.
        varType: list(string)
        defaultValue: []
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-vertex-ai//modules/model-armor-template
              version: ">=4.0.1"
            spec:
              outputExpr: "[template_id]"
    outputs:
      - name: create_time
        description: The timestamp when the resource was created.
        type: string
      - name: effective_labels
        description: All labels present on the resource in GCP, including those from Terraform and other sources.
        type:
          - map
          - string
      - name: id
        description: The fully qualified identifier of the AuthzExtension resource.
        type: string
      - name: name
        description: The name of the created AuthzExtension resource.
        type: string
      - name: terraform_labels
        description: The combination of labels configured directly on the resource and default provider labels.
        type:
          - map
          - string
      - name: update_time
        description: The timestamp when the resource was last updated.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/networkservices.admin
          - roles/iam.serviceAccountUser
    services:
      - networkservices.googleapis.com
      - cloudresourcemanager.googleapis.com
      - storage-api.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 6.46, < 8"
      - source: hashicorp/google-beta
        version: ">= 6.46, < 8"
