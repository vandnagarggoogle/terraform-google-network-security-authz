apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-network-security-authz-policy
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Google Cloud Network Security AuthzPolicy
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-network-security-authz.git
      sourceType: git
      dir: /modules/authz-policy
    version: 0.1.1
    actuationTool:
      flavor: Terraform
      version: ">= 1.3.0"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: authz_extension
        location: examples/authz_extension
      - name: authz_policy
        location: examples/authz_policy
      - name: policy_authz_extension
        location: examples/policy_authz_extension
  interfaces:
    variables:
      - name: project_id
        description: The project ID in which the Authorization Policy will be created. If not provided, the provider project is used.
        varType: string
        required: true
      - name: name
        description: The name of the Authorization Policy. If not provided, a random name will be generated.
        varType: string
        required: true
      - name: location
        description: The location of the authorization policy. Can be 'global' or a region.
        varType: string
        required: true
      - name: action
        description: The action to take when a rule match is found. Possible values are 'ALLOW' or 'DENY'.
        varType: string
        required: true
      - name: target
        description: The target resources and load balancing scheme this policy applies to.
        varType: |-
          object({
              load_balancing_scheme = optional(string)
              resources             = list(string)
            })
        required: true
      - name: description
        description: A free-text description of the Authorization Policy.
        varType: string
      - name: labels
        description: A map of labels to attach to the Authorization Policy.
        varType: map(string)
        defaultValue: {}
      - name: custom_provider
        description: Required if action is CUSTOM. Configuration for Authz Extension or Cloud IAP.
        varType: |-
          object({
              authz_extension = optional(object({
                resources = list(string)
              }))
              cloud_iap = optional(object({
                enabled = bool
              }))
            })
      - name: policy_profile
        description: Defines the type of authorization (REQUEST_AUTHZ or CONTENT_AUTHZ).
        varType: string
      - name: http_rules
        description: Complete nested structure for Authz Policy HTTP Rules.
        varType: |-
          list(object({
              when = optional(string)
              from = optional(object({
                sources = optional(object({
                  ip_blocks = optional(list(string), [])
                  principals = optional(list(object({
                    selector    = optional(string, "CLIENT_CERT_URI_SAN")
                    exact       = optional(string)
                    prefix      = optional(string)
                    suffix      = optional(string)
                    contains    = optional(string)
                    ignore_case = optional(bool, false)
                  })), [])
                  resources = optional(list(object({
                    tag_value_id_set = optional(list(string))
                    iam_service_account = optional(object({
                      exact       = optional(string)
                      prefix      = optional(string)
                      suffix      = optional(string)
                      contains    = optional(string)
                      ignore_case = optional(bool, false)
                    }))
                  })), [])
                }))
                not_sources = optional(object({
                  ip_blocks = optional(list(string), [])
                  principals = optional(list(object({
                    selector    = optional(string, "CLIENT_CERT_URI_SAN")
                    exact       = optional(string)
                    ignore_case = optional(bool, false)
                  })), [])
                  resources = optional(list(object({
                    tag_value_id_set = optional(list(string))
                    iam_service_account = optional(object({
                      exact       = optional(string)
                      prefix      = optional(string)
                      suffix      = optional(string)
                      contains    = optional(string)
                      ignore_case = optional(bool, false)
                    }))
                  })), [])
                }))
              }))
              to = optional(object({
                operations = optional(object({
                  methods = optional(list(string), [])
                  paths = optional(list(object({
                    exact       = optional(string)
                    prefix      = optional(string)
                    suffix      = optional(string)
                    contains    = optional(string)
                    ignore_case = optional(bool, false)
                  })), [])
                  hosts = optional(list(object({
                    exact       = optional(string)
                    prefix      = optional(string)
                    suffix      = optional(string)
                    contains    = optional(string)
                    ignore_case = optional(bool, false)
                  })), [])
                  headers = optional(list(object({
                    name        = string
                    exact       = optional(string)
                    prefix      = optional(string)
                    suffix      = optional(string)
                    contains    = optional(string)
                    ignore_case = optional(bool, false)
                  })), [])
                  mcp = optional(object({
                    base_protocol_methods_option = optional(string)
                    methods = list(object({
                      name   = string
                      params = optional(string)
                    }))
                  }))
                }))
                not_operations = optional(object({
                  methods = optional(list(string), [])
                  paths = optional(list(object({
                    exact       = optional(string)
                    prefix      = optional(string)
                    suffix      = optional(string)
                    contains    = optional(string)
                    ignore_case = optional(bool, false)
                  })), [])
                  hosts = optional(list(object({
                    exact = string
                  })), [])
                }))
              }))
            }))
        defaultValue: []
    outputs:
      - name: create_time
        description: The timestamp when the authz policy was created.
        type: string
      - name: effective_labels
        description: All labels present on the resource in GCP.
        type:
          - map
          - string
      - name: id
        description: The canonical ID of the authz policy.
        type: string
      - name: name
        description: The name of the authz policy.
        type: string
      - name: terraform_labels
        description: The combination of labels configured directly and default provider labels.
        type:
          - map
          - string
      - name: update_time
        description: The timestamp when the authz policy was last updated.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/networksecurity.admin
          - roles/serviceusage.serviceUsageAdmin
          - roles/iam.infrastructureAdmin
          - roles/iam.serviceAccountUser
    services:
      - networksecurity.googleapis.com
      - networkservices.googleapis.com
      - cloudresourcemanager.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 6.46, < 8"
      - source: hashicorp/google-beta
        version: ">= 6.46, < 8"
      - source: hashicorp/random
        version: ">= 3.0"
