apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-policy-authz-extension
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Google Cloud Integrated Authorization Policies and Extensions
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-network-security-authz.git
      sourceType: git
      dir: /modules/policy-authz-extension
    version: 0.2.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
    costEstimate:
      description: Blueprint cost details
      url: https://cloud.google.com/products/calculator?id=02fb0c45-cc29-4567-8cc6-f72ac9024add
  content:
    architecture:
      diagramUrl: https://www.link-to-architecture-diagram.com
      description:
        - 1. Architecture description step no. 1
        - 2. Architecture description step no. 2
        - 3. Architecture description step no. N
    documentation:
      - title: Hosting a Static Website
        url: https://cloud.google.com/storage/docs/hosting-static-website
    examples:
      - name: authz_extension
        location: examples/authz_extension
      - name: authz_policy
        location: examples/authz_policy
      - name: policy_authz_extension
        location: examples/policy_authz_extension
  interfaces:
    variables:
      - name: project_id
        description: The ID of the project in which the resource belongs.
        varType: string
        required: true
      - name: location
        description: The GCP region to deploy the resources.
        varType: string
        required: true
      - name: extensions_config
        description: A map of unique Authz Extensions, indexed by their name.
        varType: |-
          map(object({
              authority             = string
              backend_service       = string
              load_balancing_scheme = string
              description           = optional(string, "Managed by ADC")
              timeout               = optional(string, "0.1s")
              fail_open             = optional(bool, false)
              forward_headers       = optional(list(string), [])
            }))
        required: true
      - name: policies_config
        description: A map of Authz Policies with structured HTTP rules, indexed by name.
        varType: |-
          map(object({
              action                = string
              load_balancing_scheme = string
              target_resources      = list(string)
              description           = optional(string, "Managed by ADC")
              extension_names       = optional(list(string), [])
              iap_enabled           = optional(bool, false)
              http_rules = optional(list(object({
                when = optional(string)
                from = optional(object({
                  not_sources = optional(list(object({
                    ip_blocks = optional(list(object({
                      prefix = string
                      length = number
                    })), [])
                    principals = optional(list(object({
                      principal_selector = optional(string, "CLIENT_CERT_URI_SAN")
                      principal = optional(object({
                        exact       = optional(string)
                        ignore_case = optional(bool, true)
                      }))
                    })), [])
                  })), [])
                }))
                to = optional(object({
                  operations = optional(list(object({
                    methods = optional(list(string), [])
                    paths   = optional(list(object({ exact = string })), [])
                    header_set = optional(list(object({
                      headers = optional(list(object({
                        name = string
                        value = optional(object({
                          exact       = string
                          ignore_case = optional(bool, true)
                        }))
                      })), [])
                    })), [])
                  })), [])
                }))
              })), [])
            }))
        required: true
    outputs:
      - name: extension_ids
        description: The fully qualified resource names designating the authorization extensions provisioned by the module.
        type:
          - map
          - string
      - name: policy_extension_map
        description: A mapping of each authorization policy name to its designated authorization extension resource identifier.
        type:
          - map
          - list: string
      - name: policy_ids
        description: The fully qualified resource names designating the authorization policies provisioned by the module.
        type:
          - map
          - string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/networksecurity.admin
          - roles/networkservices.admin
          - roles/iam.serviceAccountUser
          - roles/storage.objectAdmin
    services:
      - cloudresourcemanager.googleapis.com
      - storage-api.googleapis.com
      - serviceusage.googleapis.com
      - networkservices.googleapis.com
      - networksecurity.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 6.46, < 8"
      - source: hashicorp/google-beta
        version: ">= 6.46, < 8"
